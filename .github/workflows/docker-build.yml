name: Docker Image CI

on:
  push:
    branches: [ "master" ]   # 你的默认分支名，可能是 master, main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write             # ⬅️ [必须配置] 向 GHCR 推送镜像的关键权限[reference:12]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry   # ⬅️ [核心改造点] 登录到 ghcr.io
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}               # GitHub 用户名
        password: ${{ secrets.GITHUB_TOKEN }}       # GitHub 自动生成的令牌

    - name: Build and push Docker images            # 使用 docker-compose 构建并推送镜像
      run: |
        docker-compose build
        docker-compose push
