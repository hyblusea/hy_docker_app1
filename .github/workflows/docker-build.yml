name: Docker Image Build and Push

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker images using compose
      run: docker compose build

    - name: Save image to tar
      run: |
        docker save -o app.tar $(docker images --format "{{.Repository}}:{{.Tag}}" | head -1)

    - name: Upload tar artifact
      uses: actions/upload-artifact@v4
      with:
        name: myapp-docker-image
        path: app.tar

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Tag and push image to ghcr.io
      run: |
        IMAGE_ID=$(docker images --format "{{.ID}}" | head -n 1)
        IMAGE_NAME_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
        docker tag $IMAGE_ID $REGISTRY/$IMAGE_NAME_LOWER:latest
        docker push $REGISTRY/$IMAGE_NAME_LOWER:latest
