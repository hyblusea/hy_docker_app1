server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    session:
      timeout: 24h

spring:
  application:
    name: tradingx-backend

  datasource:
    url: jdbc:h2:file:./data/tradingx;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  ai:
    openai:
      api-key: ${GITHUB_TOKEN:}
      base-url: https://models.github.ai/inference
      chat:
        model: deepseek/DeepSeek-V3-0324
        options:
          temperature: 0
          max-tokens: 4096

tushare:
  api-url: https://api.tushare.pro
  token: ${TUSHARE_TOKEN:}
  stock-basic-csv: /app/static-data/tushare_stock_basic.csv

management:
  endpoints:
    web:
      exposure:
        include: health,info
