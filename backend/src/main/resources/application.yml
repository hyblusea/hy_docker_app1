server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    session:
      timeout: 24h

spring:
  application:
    name: tradingx-backend

  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiConnectionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration

  datasource:
    url: jdbc:h2:file:./data/tradingx;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

deepseek:
  user-token: ${DEEPSEEK_USER_TOKEN:}

mimo:
  user-id: ${MIMO_USER_ID:}
  xiaomichatbot-ph: ${MIMO_XIAOMICHATBOT_PH:}
  service-token: ${MIMO_SERVICE_TOKEN:}

tushare:
  api-url: https://api.tushare.pro
  token: ${TUSHARE_TOKEN:}
  stock-basic-csv: /app/static-data/tushare_stock_basic.csv

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.tradingx: DEBUG
